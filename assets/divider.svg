<svg width="100%" height="2" viewBox="0 0 1000 2" fill="none" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">
  <defs>
    <linearGradient id="divider-gradient" x1="0" y1="0" x2="1000" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#18181B" />
      <stop offset="50%" stop-color="#6366F1" />
      <stop offset="100%" stop-color="#18181B" />
      <animate attributeName="x1" values="-1000;0;1000" dur="6s" repeatCount="indefinite" />
      <animate attributeName="x2" values="0;1000;2000" dur="6s" repeatCount="indefinite" />
    </linearGradient>
  </defs>
  <rect width="1000" height="2" fill="url(#divider-gradient)" />
</svg>
